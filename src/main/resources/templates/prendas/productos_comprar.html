<!DOCTYPE html>
<html lang="es">
<head th:replace="~{layout/fragmentos :: cabecera}"></head>
<body class="sb-nav-fixed">

<nav th:replace="~{layout/fragmentos :: barra}"></nav>
<div id="layoutSidenav">
    <div id="layoutSidenav_nav">
        <nav th:replace="~{layout/fragmentos :: menu}"></nav>
    </div>
</div>

<div id="layoutSidenav_content">
    <main>
        <div class="page-header">
            <h1>Productos a Comprar</h1>
            <p>Prendas pendientes agrupadas por tipo.</p>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px">

            <!-- Cuellos Redondos -->
            <div class="card" style="margin-bottom:0">
                <div class="card-header">
                    <i class="fa-solid fa-shirt"></i>
                    Cuellos Redondos
                </div>
                <div class="card-body">
                    <div th:each="item: ${listaDetallePrenda}"
                         th:if="${item.TipoPrenda == 'Cuello Redondo' and item.id_Pedido.Estado == 'PENDIENTE'}"
                         class="list-item"
                         th:text="${item.Cantidad + '× ' + item.Color + ' Talla ' + item.Talla + ' ' + item.TipoCorte}">
                    </div>
                    <div class="list-item" style="color:var(--text-3);font-size:12px"
                         th:if="${#lists.isEmpty(listaDetallePrenda)}">
                        Sin prendas pendientes
                    </div>
                </div>
            </div>

            <!-- Camiseros -->
            <div class="card" style="margin-bottom:0">
                <div class="card-header">
                    <i class="fa-solid fa-shirt"></i>
                    Camiseros
                </div>
                <div class="card-body">
                    <div th:each="item: ${listaDetallePrenda}"
                         th:if="${item.TipoPrenda == 'Camisero' and item.id_Pedido.Estado == 'PENDIENTE'}"
                         class="list-item"
                         th:text="${item.Cantidad + '× ' + item.Color + ' Talla ' + item.Talla + ' ' + item.TipoCorte}">
                    </div>
                </div>
            </div>

            <!-- Cafarenas -->
            <div class="card" style="margin-bottom:0">
                <div class="card-header">
                    <i class="fa-solid fa-shirt"></i>
                    Cafarenas
                </div>
                <div class="card-body">
                    <div th:each="item: ${listaDetallePrenda}"
                         th:if="${item.TipoPrenda == 'Cafarena' and item.id_Pedido.Estado == 'PENDIENTE'}"
                         class="list-item"
                         th:text="${item.Cantidad + '× ' + item.Color + ' Talla ' + item.Talla}">
                    </div>
                </div>
            </div>

            <!-- Gorras -->
            <div class="card" style="margin-bottom:0">
                <div class="card-header">
                    <i class="fa-solid fa-hat-cowboy"></i>
                    Gorras
                </div>
                <div class="card-body">
                    <div th:each="item: ${listaDetallePrenda}"
                         th:if="${item.TipoPrenda == 'Gorra' and item.id_Pedido.Estado == 'PENDIENTE'}"
                         class="list-item"
                         th:text="${item.Cantidad + '× ' + item.Color}">
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<div th:replace="~{layout/fragmentos :: librerias}"></div>
</body>
</html>
